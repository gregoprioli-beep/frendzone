<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendZone</title>
    
    <style>
        :root {
            --bg-color: #E5EDF5;
            --card-bg: #FFFFFF;
            --primary-blue: #B4C6E7;
            --orkut-blue: #4B6C9E;
            --text-color: #333333;
            --border-color: #C0C0C0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .hidden {
            display: none !important;
        }

        /* Header */
        header {
            background-color: var(--orkut-blue);
            padding: 10px 20px;
            color: white;
        }

        .header-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { margin: 0; font-size: 24px; }
        header button {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-left: 15px;
        }

        /* Cards e Telas */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h2 { color: var(--orkut-blue); margin-top: 0; }
        .subtitle { color: #777; margin-top: -10px; margin-bottom: 20px; }

        /* Formulários */
        form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: var(--orkut-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .btn-primary:hover { opacity: 0.9; }
        .form-links { margin-top: 15px; display: flex; justify-content: space-between; font-size: 14px; }
        .form-links a { color: var(--orkut-blue); text-decoration: none; }
        .form-links a:hover { text-decoration: underline; }

        /* Layout do Perfil */
        .profile-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }

        .profile-sidebar { text-align: center; }
        .profile-avatar {
            font-size: 80px;
            background: #e0e0e0;
            width: 120px;
            height: 120px;
            line-height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
        }

        .status { font-style: italic; color: #555; }
        .orkut-scraps { background: #F2F5F9; padding: 15px; border-radius: 4px; margin-top: 20px; }

        /* Busca */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { margin-bottom: 0; }
        .search-box button { width: auto; }
        .results-list { list-style: none; padding: 0; }
        .results-list li {
            background: white;
            padding: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header id="main-header" class="hidden">
        <div class="header-container">
            <h1 class="logo">FriendZone</h1>
            <nav>
                <button onclick="navigateTo('profile-screen')">Início</button>
                <button onclick="navigateTo('search-screen')">Buscar Amigos</button>
                <button id="btn-logout">Sair</button>
            </nav>
        </div>
    </header>

    <main class="container">
        
        <section id="login-screen" class="card">
            <h2>Bem-vindo ao FriendZone</h2>
            <p class="subtitle">A sua nova velha rede social</p>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Nome de Usuário" required>
                <input type="password" id="login-password" placeholder="Senha" required>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <div class="form-links">
                <a href="#" onclick="navigateTo('register-screen')">Não tem conta? Cadastre-se</a>
            </div>
        </section>

        <section id="register-screen" class="card hidden">
            <h2>Criar uma conta</h2>
            <form id="register-form">
                <input type="text" id="register-username" placeholder="Escolha um Nome de Usuário (ex: eder86)" required>
                <input type="password" id="register-password" placeholder="Senha (mín. 6 caracteres)" required>
                <button type="submit" class="btn-primary">Cadastrar</button>
            </form>
            <div class="form-links">
                <a href="#" onclick="navigateTo('login-screen')">Já tem conta? Faça Login</a>
            </div>
        </section>

        <section id="profile-screen" class="profile-layout hidden">
            <div class="profile-sidebar card">
                <div class="profile-avatar">👤</div>
                <h3 id="profile-name">Carregando...</h3>
                <p id="profile-status" class="status">"Sorte do dia: O amor está no ar."</p>
            </div>
            
            <div class="profile-main card">
                <h2>Meu Perfil</h2>
                <div class="orkut-scraps">
                    <h3>Recados (Scraps)</h3>
                    <p>Deixe um recado para os seus amigos aqui!</p>
                </div>
            </div>
        </section>

        <section id="search-screen" class="card hidden">
            <h2>Procurar Amigos</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Digite o nome do usuário...">
                <button id="btn-search" class="btn-primary">Buscar</button>
            </div>
            <ul id="search-results" class="results-list"></ul>
        </section>

    </main>

    <script>
        // Inicializa o banco de dados local caso esteja vazio com alguns perfis de exemplo
        if (!localStorage.getItem('fz_users')) {
            const usuariosIniciais = {
                "eder86": { password: "123" },
                "adilson_silva": { password: "123" },
                "mariah_reis": { password: "123" },
                "edilene_amor": { password: "123" }
            };
            localStorage.setItem('fz_users', JSON.stringify(usuariosIniciais));
        }

        // Sistema de Navegação entre telas (SPA)
        window.navigateTo = function(screenId) {
            const screens = ['login-screen', 'register-screen', 'profile-screen', 'search-screen'];
            screens.forEach(screen => {
                document.getElementById(screen).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        // Verifica se já existe um usuário logado no navegador ao carregar a página
        function checarSessao() {
            const usuarioLogado = localStorage.getItem('fz_current_user');
            const header = document.getElementById('main-header');
            
            if (usuarioLogado) {
                header.classList.remove('hidden');
                document.getElementById('profile-name').innerText = usuarioLogado;
                navigateTo('profile-screen');
            } else {
                header.classList.add('hidden');
                navigateTo('login-screen');
            }
        }

        // Processo de Cadastro
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('register-username').value.trim().toLowerCase();
            const password = document.getElementById('register-password').value;

            if (username.length < 3 || password.length < 4) {
                alert("O usuário deve ter ao menos 3 caracteres e a senha 4 caracteres.");
                return;
            }

            const usuarios = JSON.parse(localStorage.getItem('fz_users'));

            // Verifica se o usuário já existe no sistema
            if (usuarios[username]) {
                alert("Este nome de usuário já está sendo utilizado.");
                return;
            }

            // Salva o novo usuário no banco do navegador
            usuarios[username] = { password: password };
            localStorage.setItem('fz_users', JSON.stringify(usuarios));

            // Loga o usuário automaticamente após se cadastrar
            localStorage.setItem('fz_current_user', username);
            alert(`Usuário "${username}" criado com sucesso!`);
            document.getElementById('register-form').reset();
            checarSessao();
        });

        // Processo de Login
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;

            const usuarios = JSON.parse(localStorage.getItem('fz_users'));

            // Valida as credenciais locais
            if (usuarios[username] && usuarios[username].password === password) {
                localStorage.setItem('fz_current_user', username);
                checarSessao();
            } else {
                alert("Usuário ou senha incorretos.");
            }
        });

        // Botão Desconectar (Sair)
        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('fz_current_user');
            checarSessao();
        });

        // Mecanismo de Busca de Amigos
        document.getElementById('btn-search').addEventListener('click', () => {
            const searchTerm = document.getElementById('search-input').value.trim().toLowerCase();
            const resultsContainer = document.getElementById('search-results');
            resultsContainer.innerHTML = "";

            if (!searchTerm) {
                resultsContainer.innerHTML = "<li>Por favor, digite um nome para pesquisar.</li>";
                return;
            }

            const usuarios = JSON.parse(localStorage.getItem('fz_users'));
            const listaUsuarios = Object.keys(usuarios);

            // Filtra os usuários cadastrados que contêm o termo digitado
            const resultados = listaUsuarios.filter(user => user.includes(searchTerm));

            if (resultados.length === 0) {
                resultsContainer.innerHTML = "<li>Nenhum usuário correspondente encontrado.</li>";
                return;
            }

            resultados.forEach(user => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>👤 ${user}</strong> — Ver Perfil (Em breve)`;
                resultsContainer.appendChild(li);
            });
        });

        // Executa a checagem inicial ao abrir o arquivo
        checarSessao();
    </script>
</body>
</html>
